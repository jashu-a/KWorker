{{- if .Values.worker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: kworker
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-worker
  minReplicas: {{ .Values.worker.replicas.min }}
  maxReplicas: {{ .Values.worker.replicas.max }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.worker.autoscaling.scaleDownStabilization }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    # Scale based on queue depth exposed via Prometheus adapter
    # Requires prometheus-adapter configured with:
    #   rules:
    #     - seriesQuery: 'kworker_queue_depth{queue="default"}'
    #       resources: { overrides: { namespace: { resource: "namespace" } } }
    #       name: { as: "kworker_queue_depth" }
    #       metricsQuery: 'sum(kworker_queue_depth)'
    - type: Pods
      pods:
        metric:
          name: kworker_queue_depth
        target:
          type: AverageValue
          averageValue: "{{ .Values.worker.autoscaling.targetQueueDepth }}"
{{- end }}
