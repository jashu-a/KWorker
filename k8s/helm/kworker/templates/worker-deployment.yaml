apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: kworker
    component: worker
spec:
  replicas: {{ .Values.worker.replicas.min }}
  selector:
    matchLabels:
      app: kworker
      component: worker
  template:
    metadata:
      labels:
        app: kworker
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - kworker.worker
          args:
            - --redis-url
            - "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            - --queues
            - "{{ .Values.worker.queues }}"
            - --concurrency
            - "{{ .Values.worker.concurrency }}"
            - --poll-interval
            - "{{ .Values.worker.pollInterval }}"
          env:
            - name: KWORKER_REDIS_URL
              value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            - name: KWORKER_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: {{ .Values.worker.resources.requests.cpu }}
              memory: {{ .Values.worker.resources.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.limits.cpu }}
              memory: {{ .Values.worker.resources.limits.memory }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.Redis.from_url('redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}'); r.ping()"
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.Redis.from_url('redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}'); r.ping()"
            initialDelaySeconds: 5
            periodSeconds: 10
