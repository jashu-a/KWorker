image:
  repository: ghcr.io/jaswanth/kworker
  tag: latest
  pullPolicy: IfNotPresent

redis:
  host: redis.default.svc.cluster.local
  port: 6379
  # Set to true to deploy Redis as part of this chart
  deploy: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicas:
    min: 2
    max: 20
  concurrency: 4
  queues: "default,high"
  pollInterval: 1.0
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    # Scale when average queue depth per worker exceeds this
    targetQueueDepth: 100
    scaleDownStabilization: 300  # seconds

api:
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
